<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-base); padding: 22px; }
  #root { display: flex; flex-direction: column; gap: 20px; }
  .rowlab { font-family: var(--font-heading); text-transform: uppercase; letter-spacing: .1em; font-size: 11px; color: var(--text-faint); margin-bottom: 10px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Input, Textarea, Switch, Card } = window.RPMPubDesignSystem_cc2ec6;
  function Demo() {
    const [on, setOn] = React.useState(true);
    return (
      <>
        <div>
          <div className="rowlab">Buttons</div>
          <div className="row">
            <Button variant="primary">Save Menu</Button>
            <Button variant="secondary">Cancel</Button>
            <Button variant="ghost">Preview</Button>
            <Button variant="danger">Delete</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div>
          <div className="rowlab">Fields</div>
          <div className="row" style={{ alignItems: "flex-start" }}>
            <Input label="Item Name" placeholder="Monster Reuben" style={{ width: 220 }} />
            <Input label="Price" prefix="$" placeholder="15.99" style={{ width: 130 }} />
            <Textarea label="Description" rows={2} placeholder="Corned beef, kraut, swiss…" style={{ width: 260 }} />
          </div>
        </div>
        <div className="row" style={{ gap: 28 }}>
          <Switch checked={on} onChange={setOn} label="On the board" />
          <Card accent style={{ flex: 1 }}>
            <div style={{ fontFamily: "var(--font-heading)", color: "var(--text-primary)", textTransform: "uppercase", letterSpacing: ".06em" }}>Card · accent</div>
          </Card>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
