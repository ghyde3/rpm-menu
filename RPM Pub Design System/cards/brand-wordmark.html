<!-- @dsCard group="Brand" viewport="700x220" name="Wordmark (type-set)" subtitle="No logo file provided — RPM set in Bungee + Oswald tagline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-base); }
  .wrap { padding: 22px 20px; }
  .mark { font-family: var(--font-accent); font-size: 58px; line-height: .9; color: var(--rpm-cream); letter-spacing: .02em; }
  .mark .r { color: var(--accent-primary); }
  .tag { font-family: var(--font-heading); font-weight: 600; text-transform: uppercase; letter-spacing: .18em; font-size: 13px; color: var(--accent-secondary); margin-top: 10px; }
  .sub { font-family: var(--font-body); font-style: italic; color: var(--text-muted); font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><span class="r">R</span>PM</div>
    <div class="tag">Full Service Patio Pub &amp; Grill</div>
    <div class="sub">Newnan, GA · set in Bungee (mark) + Oswald (tagline) — no original logo file supplied</div>
  </div>
</body>
</html>
