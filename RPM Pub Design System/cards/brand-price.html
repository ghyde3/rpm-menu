<!-- @dsCard group="Brand" viewport="700x170" name="Price Treatment" subtitle="Big dollars, raised superscript cents — no dollar sign on the board" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-base); }
  .wrap { padding: 20px; display: flex; gap: 40px; align-items: center; }
  .p { font-family: var(--font-heading); font-weight: 700; color: var(--accent-price); line-height: 1; }
  .p .c { font-size: .52em; vertical-align: .55em; margin-left: 1px; }
  .lab { display:block; font-family: var(--font-body); font-size: 12px; color: var(--text-faint); margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div><span class="p" style="font-size:44px">12<span class="c">99</span></span><span class="lab">menu row · md</span></div>
    <div><span class="p" style="font-size:72px">15<span class="c">00</span></span><span class="lab">TV board · lg</span></div>
    <div><span class="p" style="font-size:22px">9<span class="c">99</span></span><span class="lab">inline · sm</span></div>
  </div>
</body>
</html>
