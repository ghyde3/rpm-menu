<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base grid — sp-1 through sp-9" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-base); font-family: var(--font-body); }
  .wrap { padding: 18px; display: flex; gap: 14px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent-secondary); width: 100%; border-radius: 2px; }
  .col span { font-size: 11px; color: var(--text-muted); }
  .col .px { color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col" style="width:24px"><div class="bar" style="height:4px"></div><span>1</span><span class="px">4</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:8px"></div><span>2</span><span class="px">8</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:12px"></div><span>3</span><span class="px">12</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:16px"></div><span>4</span><span class="px">16</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:24px"></div><span>5</span><span class="px">24</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:32px"></div><span>6</span><span class="px">32</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:48px"></div><span>7</span><span class="px">48</span></div>
    <div class="col" style="width:24px"><div class="bar" style="height:64px"></div><span>8</span><span class="px">64</span></div>
  </div>
</body>
</html>
