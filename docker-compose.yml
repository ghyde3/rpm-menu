services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rpm_menu
    ports:
      - "55432:5432"
    volumes:
      - rpm_menu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rpm_menu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rpm_menu_pgdata:
